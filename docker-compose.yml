services:
  web:
    image: node:20.19-alpine
    working_dir: /app
    ports:
      - "8005:8005"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
    command: >
      sh -c "
        rm -rf .next &&
        npm install &&
        npm run build &&
        npm run start
      "
