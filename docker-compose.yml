services:
  web:
    image: node:20.19-alpine
    working_dir: /app
    ports:
      - "8005:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
    command: >
      sh -c "
        npm install &&
        npm run dev
      "
